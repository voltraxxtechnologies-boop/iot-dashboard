<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Monitoring Dashboard</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png"
    href="https://raw.githubusercontent.com/voltraxxtechnologies-boop/my-website-assets/53933e88a81248217341a7e370001d6d63296433/LOGO1.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6A329F, #3B1C5B);
      color: white;
      overflow-x: hidden;
    }

    /* ---------- UNIFIED NAVBAR ---------- */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      /* identical to other pages */
      background: rgba(26, 26, 26, 0.35);
      position: relative;
      z-index: 1000;
      /* height: 60px; */
      /* fixed height like other pages */
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .nav-logo-box {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .nav-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      flex-shrink: 0;
    }

    /* TEXT STACK (IMPORTANT) */
    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.1;
    }

    .nav-buttons {
      display: flex;
      gap: 20px;
      margin-left: 30px;
      /* 🔥 add this */
      flex-shrink: 1;
    }

    .nav-buttons button {
      background: transparent;
      color: #fff;
      padding: 8px 14px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: .25s;
      white-space: nowrap;
    }

    .nav-buttons button.active {
      background: linear-gradient(135deg, #C9A8E3, #6A329F);
      font-weight: 700;
      color: #fff;
    }

    .nav-buttons button:hover {
      border: 2px solid #C9A8E3;
    }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .hamburger div {
      width: 28px;
      height: 3px;
      background: white;
      border-radius: 2px;
    }

    @media(max-width:600px) {
      .nav-buttons {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }

    /* ---------- MOBILE MENU ---------- */
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(26, 26, 26, 0.95);
      padding: 12px;
      position: absolute;
      left: 0;
      right: 0;
      top: 90px;
      z-index: 6000;
    }

    .mobile-menu button {
      background: transparent;
      border: none;
      font-size: 16px;
      color: white;
      padding: 14px;
      text-align: left;
    }

    .mobile-menu button.active {
      color: #ffd6ff;
      font-weight: bold;
    }

    /* Everything below is unchanged… */

    .category-block {
      display: none;
    }

    .section-title {
      margin: 18px 10px;
      font-size: 20px;
      font-weight: 600;
    }

    .section {
      display: flex;
      flex-wrap: wrap;
      /* allows cards to move to next row */
      gap: 12px;
      padding: 8px 10px 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      padding: 11px;
      border-radius: 12px;
      width: 180px;
      /* ~20% smaller */
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      transition: .25s;
    }

    @media (max-width:1200px) {
      .card {
        width: 170px;
      }
    }

    @media (max-width:900px) {
      .card {
        width: 155px;
      }
    }

    @media (max-width:600px) {
      .card {
        width: 140px;
      }
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.55);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
    }

    .ids {
      font-size: 12px;
      opacity: .85;
    }

    .main-line {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
    }

    .main-label {
      font-size: 16px;
      color: #ffd6ff;
    }

    .main-value {
      font-size: 22px;
      font-weight: 700;
    }

    .sub-line {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
    }

    .sub-label {
      font-size: 13px;
      opacity: .85;
    }

    .sub-value {
      font-size: 16px;
      font-weight: 600;
    }

    /* ---------- LOADING SCREEN ---------- */
    #loadingScreen {
      position: fixed;
      top: 90px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 5000;
      color: white;
      text-align: center;
    }

    .loader {
      width: 55px;
      height: 55px;
      border: 5px solid #ffffff55;
      border-top-color: #C9A8E3;
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ===== TOGGLE SWITCH ===== */
    .switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 26px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider {
      position: absolute;
      inset: 0;
      background: #888;
      border-radius: 30px;
      transition: .3s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 20px;
      width: 20px;
      left: 3px;
      bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: .3s;
    }

    input:checked+.slider {
      background: #17c964;
    }

    input:checked+.slider:before {
      transform: translateX(24px);
    }

    /* LABEL */
    .switch-label {
      font-size: 14px;
      font-weight: 600;
    }

    /* LOADING */
    .switch.loading .slider {
      background: linear-gradient(90deg, #ffca2c, #ffd86b, #ffca2c);
      background-size: 200% 100%;
      animation: loadingMove 1s linear infinite;
    }

    @keyframes loadingMove {
      0% {
        background-position: 0% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .switch.loading .slider:before {
      animation: none;
      opacity: 0.6;
    }

    .user-info {
      font-size: 13px;
      line-height: 1.2;
      opacity: 0.9;
    }

    @keyframes spinSwitch {
      from {
        transform: rotate(0)
      }

      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>

  <!-- LOADING -->
  <div id="loadingScreen">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <script>
    function hideLoader() {
      const l = document.getElementById("loadingScreen");
      if (l) l.style.display = "none";
    }
    function showNoData() {
      document.querySelector("#loadingScreen .loader").style.display = "none";
      document.querySelector("#loadingScreen p").innerText = "NO DATA FOUND";
    }
  </script>

  <!-- NAV -->
  <div class="top-nav">

    <div class="nav-brand">

      <div class="nav-logo-box">
        <img
          src="https://raw.githubusercontent.com/voltraxxtechnologies-boop/my-website-assets/53933e88a81248217341a7e370001d6d63296433/LOGO1.png">
      </div>

      <div class="brand-text">
        <div class="logo">Voltraxx</div>
        <div class="user-info" id="userInfo"></div>
      </div>

    </div>

    <div class="nav-buttons">
      <button class="active" onclick="navigate('monitoring.html',this)">Monitoring</button>
      <button onclick="navigate('analysis.html',this)">Analysis</button>
      <button onclick="navigate('history.html',this)">History</button>
      <button onclick="navigate('settings.html',this)">Settings</button>
      <button onclick="logoutUser()">Logout</button>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
      <div></div>
      <div></div>
      <div></div>
    </div>

  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu" class="mobile-menu">
    <button class="active" onclick="navigate('monitoring.html',this)">Monitoring</button>
    <button onclick="navigate('analysis.html',this)">Analysis</button>
    <button onclick="navigate('history.html',this)">History</button>
    <button onclick="navigate('settings.html',this)">Settings</button>
    <button onclick="logoutUser()">Logout</button>
  </div>

  <!-- CONTENT -->
  <div class="section-wrap" id="groupsContainer"></div>

  <script>

    /* Navigation */
    function toggleMenu() {
      const m = document.getElementById('mobileMenu');
      m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
    }
    function navigate(page, btn) {
      document.querySelectorAll('.nav-buttons button,.mobile-menu button')
        .forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      window.location.href = page;
    }
    function logoutUser() {
      sessionStorage.clear();
      window.location = "index.html";
    }

    /* API */
    const BASE_URL = sessionStorage.getItem("BASE_URL");
    if (!BASE_URL) { alert("Session expired."); window.location = "index.html"; }
    let pendingSwitches = {};

    function loadUserInfo() {

      const client = sessionStorage.getItem("CLIENT") || "Unknown";
      const device = sessionStorage.getItem("DEVICE_ID") || "-";

      const el = document.getElementById("userInfo");

      if (el) {
        el.innerHTML = `${client} - ID: ${device}`;
      }
    }

    // call it
    loadUserInfo();

    function checkSession() {

      const loginTime = sessionStorage.getItem("LOGIN_TIME");

      if (!loginTime) {
        logoutUser();
        return;
      }

      const now = Date.now();
      const oneHour = 60 * 60 * 1000;

      if (now - loginTime > oneHour) {
        alert("Session expired. Please login again.");
        logoutUser();
      }
    }

    function resetTimer() {
      sessionStorage.setItem("LOGIN_TIME", Date.now());
    }

    document.addEventListener("click", resetTimer);
    document.addEventListener("keydown", resetTimer);

    checkSession();
    setInterval(checkSession, 10000);

    /* Load data */
    loadData();
    let autoRefresh = setInterval(() => {
      if (!document.hidden) {   // only refresh when tab active
        loadData();
      }
    }, 1000);

    function loadData() {

      fetch(`${BASE_URL}?page=monitoring`)
        .then(r => r.json())
        .then(data => {

          const container = document.getElementById("groupsContainer");
          container.innerHTML = "";

          const groups = data.groups || {};
          let total = 0;

          const groupKeys = Object.keys(groups).sort((a, b) => {

            if (a === "All") return 1;     // push All to bottom
            if (b === "All") return -1;

            return a.localeCompare(b);   // normal alphabetical order

          });

          groupKeys.forEach(groupName => {

            const sensors = groups[groupName] || [];

            // keep only sensors with valid data
            const validSensors = sensors.filter(item => {
              let value = item.mainData;
              if (!isValid(value)) value = item.readings;
              return isValid(value);
            });

            // if no sensors with data → skip section
            if (validSensors.length === 0) return;

            const block = document.createElement("div");
            block.className = "category-block";
            block.style.display = "block";

            block.innerHTML = `
        <h2 class="section-title">${groupName}</h2>
        <div class="section" id="group-${groupName.replace(/\s+/g, '-')}"></div>
      `;

            container.appendChild(block);

            const section = block.querySelector(".section");
            validSensors.forEach(item => {

              let value = item.mainData;

              if (!isValid(value)) {
                value = item.readings;
              }

              if (!isValid(value)) return;

              total++;

              const card = document.createElement("div");
              card.className = "card";

              let isSwitch = item.sensorID >= 130;

              card.innerHTML = `
          <div class="card-header">
            <div class="title"></div>
            <div class="ids"></div>
          </div>

          <div class="main-line">
            <div class="main-label"></div>

            ${isSwitch
                  ? `
                <label class="switch" id="wrap-${item.controllerID}-${item.sensorID}">
                  <input type="checkbox" id="sw-${item.controllerID}-${item.sensorID}">
                  <span class="slider"></span>
                </label>
              `
                  : `<div class="main-value"></div>`
                }
          </div>

          <div class="sub-line">
            <div class="sub-label"></div>
            <div class="sub-value"></div>
          </div>
        `;

              section.appendChild(card);

              const cID = item.controllerID;
              const sID = item.sensorID;

              let title;

              if (item.label) {
                title = item.label;
              } else {
                if (sID >= 130) {
                  title = `Device C${cID}:S${sID}`;
                } else {
                  title = `Sensor C${cID}:S${sID}`;
                }
              }

              card.querySelector(".title").innerText = title;
              card.querySelector(".ids").innerText = `C${cID}:S${sID}`;

              card.querySelector(".main-label").innerText = item.mainLabel || "";
              if (!isSwitch) {
                card.querySelector(".main-value").innerText =
                  `${value}${item.mainUnit || ""}`;
              }

              card.querySelector(".sub-label").innerText = item.subLabel || "";
              card.querySelector(".sub-value").innerText =
                item.subData != null && item.subData !== "" ?
                  `${item.subData}${item.subUnit || ""}` : "";


              let col = "#e69df4";

              // 🔵 Device (sID ≥ 130)
              if (sID >= 130) {
                col = "#4dabf7";
              }

              // 🔴 HIGH condition
              if (checkCondition(value, item.high)) {
                col = "#ff4d4f";
              }

              // 🟢 LOW condition
              else if (checkCondition(value, item.low)) {
                col = "#17c964";
              }

              card.style.borderLeft = `10px solid ${col}`;

              // ===== SWITCH LOGIC =====
              if (isSwitch) {

                const checkbox = card.querySelector(`#sw-${cID}-${sID}`);
                const wrapper = card.querySelector(`#wrap-${cID}-${sID}`);

                const key = `${cID}-${sID}`;

                const serverValue = (value == 1 || value === "1");

                if (pendingSwitches[key] !== undefined) {

                  const pendingValue = (pendingSwitches[key] == "1");

                  checkbox.checked = pendingValue;

                  // ✅ ONLY unlock when server matches
                  if (serverValue === pendingValue) {
                    delete pendingSwitches[key];
                  }

                } else {

                  checkbox.checked = serverValue;

                }

                checkbox.addEventListener("change", () => {

                  if (checkbox.disabled) return;

                  clearInterval(autoRefresh);

                  const newVal = checkbox.checked ? "1" : "0";

                  // 🔒 lock this switch
                  pendingSwitches[`${cID}-${sID}`] = newVal;

                  checkbox.disabled = true;
                  wrapper.classList.add("loading");

                  sendToGoogleSheet(cID, sID, newVal, checkbox, wrapper);

                });

              }

            });

          });

          if (total === 0) showNoData();
          else hideLoader();

        })
        .catch(() => showNoData());
    }

    function isValid(v) {
      return !(v === "" || v == null || v === "-" || (typeof v === "string" && v.trim() === ""));
    }

    function sendToGoogleSheet(controllerID, sensorID, reading, checkbox, wrapper) {

      fetch(BASE_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/x-www-form-urlencoded"
        },
        body:
          "controllerID=" + controllerID +
          "&sensorID=" + sensorID +
          "&reading=" + reading
      })
        .then(res => res.text())
        .then(res => {

          console.log("Updated:", res);

          if (wrapper) wrapper.classList.remove("loading");

          // ⏳ keep disabled slightly longer
          setTimeout(() => {
            if (checkbox) checkbox.disabled = false;
          }, 500);

          setTimeout(() => {

            // 🔒 ensure only one interval exists
            clearInterval(autoRefresh);
            autoRefresh = setInterval(loadData, 1500);

          }, 300);

        })
        .catch(err => {

          console.error(err);

          if (checkbox) {
            checkbox.checked = !checkbox.checked;
            checkbox.disabled = false;
          }

          if (wrapper) wrapper.classList.remove("loading");

        });
    }

    function checkCondition(value, condition) {

      if (!condition || condition === "") return false;

      condition = condition.toString().trim();

      const num = parseFloat(condition.replace(/[^\d.-]/g, ""));
      if (isNaN(num)) return false;

      if (condition.startsWith(">=")) return value >= num;
      if (condition.startsWith("<=")) return value <= num;
      if (condition.startsWith(">")) return value > num;
      if (condition.startsWith("<")) return value < num;
      if (condition.startsWith("=")) return value == num;

      return false;
    }

  </script>

</body>

</html>
