<!DOCTYPE html>
<html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sensor Settings</title>

  <!-- TAB ICON -->
  <link rel="icon" type="image/png"
    href="https://raw.githubusercontent.com/voltraxxtechnologies-boop/my-website-assets/53933e88a81248217341a7e370001d6d63296433/LOGO1.png">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6A329F, #3B1C5B);
      color: white;
      overflow-x: hidden;
    }

    /* ---------- NAVIGATION BAR (UPDATED) ---------- */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: rgba(26, 26, 26, 0.35);
      /* height:60px; */
      position: relative;
      z-index: 1000;
    }

    /* Brand (Logo + Text) */
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      /* prevents compression */
      white-space: nowrap;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.1;
    }

    .nav-logo-box {
      width: 60px;
      height: 60px;
      flex-shrink: 0;
      border-radius: 12px;
      overflow: hidden;
    }

    .nav-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      flex-shrink: 0;
      /* text never shrinks */
    }

    .user-info {
      font-size: 13px;
      line-height: 1.2;
      opacity: 0.9;
    }

    /* NAV BUTTONS */
    .nav-buttons {
      display: flex;
      gap: 20px;
      margin-left: 30px;
      flex-shrink: 1;
      /* buttons adapt instead of brand */
    }

    .nav-buttons button {
      background: transparent;
      color: white;
      padding: 8px 14px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: .25s;
      white-space: nowrap;
    }

    .nav-buttons button.active {
      background: linear-gradient(135deg, #C9A8E3, #6A329F);
      font-weight: 700;
      color: white;
    }

    .nav-buttons button:hover {
      border: 2px solid #C9A8E3;
    }

    /* ---------- HAMBURGER ---------- */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      margin-left: 20px;
      flex-shrink: 0;
    }

    .hamburger div {
      width: 28px;
      height: 3px;
      background: white;
      border-radius: 2px;
    }

    @media(max-width:600px) {
      .nav-buttons {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }

    /* ---------- MOBILE MENU ---------- */
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(26, 26, 26, 0.95);
      padding: 12px;
      position: absolute;
      left: 0;
      right: 0;
      top: 90px;
      /* YOU REQUESTED */
      z-index: 6000;
    }

    .mobile-menu button {
      background: transparent;
      border: none;
      font-size: 16px;
      color: white;
      text-align: left;
      padding: 14px;
      white-space: nowrap;
    }

    .mobile-menu button.active {
      color: #ffd6ff;
      font-weight: bold;
    }

    /* ---------- LOADING SCREEN ---------- */
    #loadingScreen {
      position: fixed;
      top: 90px;
      /* YOUR PREFERENCE */
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 5000;
      color: white;
      text-align: center;
    }

    .loader {
      width: 55px;
      height: 55px;
      border: 5px solid #ffffff55;
      border-top-color: #C9A8E3;
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin-bottom: 10px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ---------- SETTINGS PAGE UI ---------- */


    .settings-container {
      padding: 10px 20px;
      max-width: 900px;
      margin: auto;
    }

    .section {
      cursor: pointer;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      border-radius: 14px;
      padding: 12px 16px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      margin: 8px auto;
      width: 90%;
      max-width: 850px;
      transition: 0.3s;
    }

    .section-header {
      user-select: none;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 6px;
    }

    .section-body {
      display: none;
      margin-top: 6px;
    }

    .settings-table {
      width: 100%;
      border-collapse: collapse;
    }

    .settings-table tr {
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding: 10px 20px;
    }

    .settings-table td:first-child {
      width: 45%;
    }

    .settings-table td:last-child {
      width: 55%;
      display: flex;
      justify-content: flex-start;
    }

    .settings-table input,
    .settings-table select {
      width: 100%;
      padding: 6px 10px;
    }

    .inline-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }

    .inline-row select {
      width: 80px;
    }

    .inline-row input {
      flex: 1;
    }

    .saveBtn {
      margin-top: 12px;
      padding: 10px 18px;
      background: #C9A8E3;
      border: none;
      border-radius: 8px;
      font-weight: 600;
    }

    .arrow {
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    /* rotate when open */
    .section.open .arrow {
      transform: rotate(180deg);
    }

    .readonly {
      background: rgba(255, 255, 255, 0.2);
      color: #ccc;
      cursor: not-allowed;
    }

    .group-container {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      width: 100%;
      position: relative;
      align-items: center;
    }

    .group-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      position: relative;

      background: rgba(255, 255, 255, 0.2);
      padding: 6px 10px;
      padding-right: 22px;

      border-radius: 20px;
      font-size: 13px;
    }

    .group-text {
      white-space: nowrap;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .group-chip .remove {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      transition: 0.2s;
      cursor: pointer;
    }

    .group-chip:hover .remove {
      opacity: 1;
      pointer-events: auto;
    }


    .group-chip:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .add-chip {
      background: rgba(255, 255, 255, 0.1);
      padding: 6px 12px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
    }

    .add-chip:hover {
      background: rgba(255, 255, 255, 0.25);
    }

    .group-dropdown {
      position: absolute;
      top: -8px;
      transform: translateY(-100%);
      left: 0;
      background: rgba(30, 30, 30, 0.95);
      border-radius: 8px;
      padding: 8px;
      min-width: 180px;
      /* slightly bigger */
      max-width: 220px;
      /* prevent stretching */
    }

    .group-dropdown input {
      width: 100%;
      box-sizing: border-box;
      /* 🔥 IMPORTANT FIX */
      padding: 6px 8px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .group-option {
      padding: 8px;
      cursor: pointer;
    }

    .group-option:hover {
      background: rgba(255, 255, 255, 0.15);
    }

    .save-container {
      text-align: center;
    }
  </style>
</head>

<body>

  <!-- LOADING SCREEN -->
  <div id="loadingScreen">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <script>
    function hideLoader() {
      const l = document.getElementById("loadingScreen");
      if (l) l.style.display = "none";
    }
  </script>

  <!-- NAVBAR -->
  <div class="top-nav">

    <div class="nav-brand">

      <div class="nav-logo-box">
        <img
          src="https://raw.githubusercontent.com/voltraxxtechnologies-boop/my-website-assets/53933e88a81248217341a7e370001d6d63296433/LOGO1.png">
      </div>

      <div class="brand-text">
        <div class="logo">Voltraxx</div>
        <div class="user-info" id="userInfo"></div>
      </div>

    </div>

    <div class="nav-buttons">
      <button onclick="nav('monitoring.html')">Monitoring</button>
      <button onclick="nav('analysis.html')">Analysis</button>
      <button onclick="nav('history.html')">History</button>
      <button class="active" onclick="nav('settings.html')">Settings</button>
      <button onclick="logoutUser()">Logout</button>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
      <div></div>
      <div></div>
      <div></div>
    </div>

  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu" class="mobile-menu">
    <button onclick="nav('monitoring.html')">Monitoring</button>
    <button onclick="nav('analysis.html')">Analysis</button>
    <button onclick="nav('history.html')">History</button>
    <button class="active" onclick="nav('settings.html')">Settings</button>
    <button onclick="logoutUser()">Logout</button>
  </div>

  <!-- ✅ ADD BELOW THIS -->
  <div class="settings-container">

    <!-- 1 SENSOR -->
    <div class="section" onclick="handleSectionClick(event, 'sensorBox', this)">
      <div class="section-header">
        <span id="sensorTitle">Sensor / IO</span>
        <span class="arrow">⌄</span>
      </div>

      <div id="sensorBox" class="section-body">
        <select id="sensorSelect" size="5" style="width:100%"></select>
      </div>
    </div>

    <!-- 2 DISPLAY -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('displayBox', this)">
        <span>Display Settings</span>
        <span class="arrow">⌄</span>
      </div>

      <div id="displayBox" class="section-body">
        <table id="displayTable" class="settings-table"></table>
        <div class="save-container">
          <button class="saveBtn" onclick="saveDisplay()">Save</button>
        </div>
      </div>
    </div>

    <!-- 3 GROUP -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('groupBox', this)">
        <span>Group Settings</span>
        <span class="arrow">⌄</span>
      </div>

      <div id="groupBox" class="section-body">
        <table class="settings-table">
          <tr>
            <td>Groups</td>
            <td class="inline-row">
              <div id="groupMasterContainer" class="group-container"></div>
            </td>
          </tr>
        </table>

        <div class="save-container">
          <button class="saveBtn" onclick="saveGroupList()">Save</button>
        </div>
      </div>
    </div>

    <!-- 4 FORMULA -->
    <div class="section">
      <div class="section-header" onclick="toggleSection('formulaBox', this)">
        <span>Formula Settings</span>
        <span class="arrow">⌄</span>
      </div>
      <div id="formulaBox" class="section-body">
        (Next Phase)
      </div>


    </div>

    <script>
      function nav(p) { window.location.href = p; }

      function toggleMenu() {
        const m = document.getElementById("mobileMenu");
        m.style.display = (m.style.display === "flex") ? "none" : "flex";
      }

      function logoutUser() {
        sessionStorage.clear();
        window.location = "index.html";
      }

      const BASE_URL = sessionStorage.getItem("BASE_URL");
      if (!BASE_URL) {
        alert("Session expired."); window.location = "index.html";
      }

      function loadUserInfo() {

        const client = sessionStorage.getItem("CLIENT") || "Unknown";
        const device = sessionStorage.getItem("DEVICE_ID") || "-";

        const el = document.getElementById("userInfo");

        if (el) {
          el.innerHTML = `${client} - ID: ${device}`;
        }
      }

      loadUserInfo();

      function checkSession() {

        const loginTime = sessionStorage.getItem("LOGIN_TIME");

        if (!loginTime) {
          logoutUser();
          return;
        }

        const now = Date.now();
        const oneHour = 60 * 60 * 1000;

        if (now - loginTime > oneHour) {
          alert("Session expired. Please login again.");
          logoutUser();
        }
      }

      function resetTimer() {
        sessionStorage.setItem("LOGIN_TIME", Date.now());
      }

      document.addEventListener("click", resetTimer);
      document.addEventListener("keydown", resetTimer);

      checkSession();
      setInterval(checkSession, 10000);

      function handleSectionClick(e, id, sectionEl) {

        if (e.target.closest("input, select, button, .group-chip, .add-chip, .group-dropdown, .group-option, #groupMasterDropdown")) {
          return;
        }

        const header = sectionEl.querySelector(".section-header");
        toggleSection(id, header);
      }

      function updateSensorTitle() {

        const el = document.getElementById("sensorTitle");

        if (!selected) {
          el.innerText = "Sensor / IO";
          return;
        }

        const labelType = selected.sensorID >= 130 ? "IO" : "Sensor";
        el.innerText = `${labelType} - ${selected.sensorID}`;
      }

      let sensors = [];
      let io = [];
      let selected = null;
      let groupList = [];
      let masterGroups = [];     // current visible chips
      let removedGroups = [];    // goes into + dropdown
      let displayGroups = [];

      /* LOAD SETTINGS */
      async function loadSettings() {
        
        closeAllSections();
        try {

          const res = await fetch(BASE_URL + "?page=settings");

          if (!res.ok) throw new Error("Server error");

          const data = await res.json();

          sensors = data.sensors || [];
          io = data.io || [];
          groupList = data.groups || [];
          masterGroups = [...groupList];
          removedGroups = [];

          renderGroupMaster();

          const sel = document.getElementById("sensorSelect");
          sel.innerHTML = "<option value=''>Select Sensor</option>";

          let defaultSensor = null;

          [...sensors, ...io].forEach(s => {
            const labelType = s.sensorID >= 130 ? "IO" : "Sensor";
            const o = document.createElement("option");
            o.value = s.sensorID;
            o.textContent = `Controller ${s.controllerID} - ${labelType} ${s.sensorID}`;
            sel.appendChild(o);

            if (s.sensorID == 10) {
              defaultSensor = s;
            }
          });

          // ✅ Apply default selection AFTER loop
          if (defaultSensor) {
            selected = defaultSensor;
            sel.value = defaultSensor.sensorID;
            renderDisplay(); // prepare data only        
            updateSensorTitle();
          }

          // fallback
          else if (sensors.length) {
            selected = sensors[0];
            sel.value = sensors[0].sensorID;
            renderDisplay(); // only load, don't open
          }

          setTimeout(hideLoader, 200);

        } catch (e) {
          console.error(e);
          setTimeout(hideLoader, 200);
          alert("Failed to load settings. Check connection.");
        }
      }
      function closeAllSections() {
        document.querySelectorAll(".section-body").forEach(el => {
          el.style.display = "none";
          el.parentElement.classList.remove("open");
        });
      }

      (async () => {
        await loadSettings();
      })();

      /* SELECT SENSOR */
      document.getElementById("sensorSelect").addEventListener("change", e => {

        const id = Number(e.target.value);

        if (!id) {
          selected = null;
          document.getElementById("displayTable").innerHTML = "";
          document.getElementById("displayBox").style.display = "none";
          updateSensorTitle();
          return;
        }

        selected = [...sensors, ...io].find(s => s.sensorID === id);

        if (selected) {
          renderDisplay();
          updateSensorTitle();
        }

      });

      /* TOGGLE */
      function toggleSection(id, headerEl) {

        document.querySelectorAll(".section-body").forEach(el => {
          if (el.id !== id) {
            el.style.display = "none";
            el.parentElement.classList.remove("open");
          }
        });

        const box = document.getElementById(id);
        const section = headerEl.parentElement;

        if (box.style.display === "block") {
          box.style.display = "none";
          section.classList.remove("open");
        } else {
          box.style.display = "block";
          section.classList.add("open");
        }
      }

      /* DISPLAY TABLE */
      function renderDisplay() {

        if (!selected) return;
        const s = selected;
        const isIO = s.sensorID >= 130;
        const labelType = isIO ? "IO" : "Sensor";
        let highOp = ">";
        let highVal = "";

        if (s.high) {
          const match = s.high.match(/(>=|<=|>|<|=)(.*)/);
          if (match) {
            highOp = match[1];
            highVal = match[2];
          }
        }

        let lowOp = "<";
        let lowVal = "";

        if (s.low) {
          const match = s.low.match(/(>=|<=|>|<|=)(.*)/);
          if (match) {
            lowOp = match[1];
            lowVal = match[2];
          }
        }

        displayGroups = (s.group || "")
          .split(",")
          .map(g => g.trim())
          .filter(g => g);

        document.getElementById("displayTable").innerHTML = `

    <tr>
      <td>Controller</td>
      <td><input value="${s.controllerID}" disabled class="readonly"></td>
    </tr>

    <tr>
      <td>${labelType}</td>
      <td><input value="${s.sensorID}" disabled class="readonly"></td>
    </tr>

    <tr><td>Type</td><td><input id="type" value="${s.type || ""}"></td></tr>
    <tr><td>Label</td><td><input id="label" value="${s.label || ""}"></td></tr>

    <tr><td>Main Label</td><td><input id="mainLabel" value="${s.mainLabel || ""}"></td></tr>
    ${!isIO ? `
    <tr><td>Main Unit</td><td><input id="mainUnit" value="${s.mainUnit || ""}"></td></tr>
    ` : ""}

    <tr><td>Sub Label</td><td><input id="subLabel" value="${s.subLabel || ""}"></td></tr>

    ${!isIO ? `
    <tr><td>Sub Unit</td><td><input id="subUnit" value="${s.subUnit || ""}"></td></tr>
    ` : ""}

    ${!isIO ? `
    <tr>
      <td>High</td>
      <td class="inline-row">
        <select id="highOp">
          <option value=">" ${highOp === ">" ? "selected" : ""}>&gt;</option>
          <option value="<" ${highOp === "<" ? "selected" : ""}>&lt;</option>
          <option value=">=" ${highOp === ">=" ? "selected" : ""}>&gt;=</option>
          <option value="<=" ${highOp === "<=" ? "selected" : ""}>&lt;=</option>
          <option value="=" ${highOp === "=" ? "selected" : ""}>=</option>
        </select>

        <input id="highVal" type="number" step="any" value="${highVal}">
      </td>
    </tr>

    <tr>
      <td>Low</td>
      <td class="inline-row">
        <select id="lowOp">
          <option value=">" ${lowOp === ">" ? "selected" : ""}>&gt;</option>
          <option value="<" ${lowOp === "<" ? "selected" : ""}>&lt;</option>
          <option value=">=" ${lowOp === ">=" ? "selected" : ""}>&gt;=</option>
          <option value="<=" ${lowOp === "<=" ? "selected" : ""}>&lt;=</option>
          <option value="=" ${lowOp === "=" ? "selected" : ""}>=</option>
        </select>

        <input id="lowVal" type="number" step="any" value="${lowVal}">
      </td>
    </tr>
    ` : ""}

    <tr>
      <td>Group</td>
      <td class="inline-row">
        <div id="groupContainer" class="group-container"></div>
      </td>
    </tr>
    `;
        renderGroupChips(displayGroups);
      }

      function renderGroupChips(groups) {

        const container = document.getElementById("groupContainer");
        container.innerHTML = "";

        // ➕ ADD BUTTON FIRST
        const addWrapper = document.createElement("div");
        addWrapper.style.position = "relative";

        const add = document.createElement("div");
        add.className = "add-chip";
        add.innerText = "+";

        add.onclick = (e) => {
          e.stopPropagation();
          e.preventDefault();
          toggleGroupDropdown(addWrapper, groups);
        };

        addWrapper.appendChild(add);

        container.appendChild(addWrapper);

        // EXISTING CHIPS
        groups.forEach(g => {
          const chip = document.createElement("div");
          chip.className = "group-chip";
          chip.innerHTML = `
          <span class="group-text">${g}</span>
          <span class="remove">✕</span>
        `;

          chip.querySelector(".remove").onclick = (e) => {
            e.stopPropagation();
            displayGroups = displayGroups.filter(x => x !== g);
            renderGroupChips(displayGroups);
          };

          container.appendChild(chip);
        });
      }

      function toggleGroupDropdown(wrapper, current) {

        // remove existing dropdown if open
        const existing = document.getElementById("groupDropdown");
        if (existing) {
          existing.remove();
          return;
        }

        const dropdown = document.createElement("div");
        dropdown.id = "groupDropdown";
        dropdown.className = "group-dropdown";

        const remaining = groupList.filter(g => !current.includes(g));

        if (!remaining.length) {
          dropdown.innerHTML = "<div style='padding:8px;opacity:0.7;'>No groups</div>";
        } else {
          remaining.forEach(g => {
            const item = document.createElement("div");
            item.className = "group-option";
            item.innerText = g;

            item.onclick = () => {
              if (current.includes(g)) return;
              if (!displayGroups.includes(g)) {
                displayGroups.push(g);
              }
              renderGroupChips(displayGroups);
            };

            dropdown.appendChild(item);
          });
        }

        wrapper.appendChild(dropdown);

        // auto close on outside click
        setTimeout(() => {
          const handler = (e) => {
            if (!wrapper.contains(e.target)) {
              removeGroupDropdown();
              document.removeEventListener("click", handler);
            }
          };
          document.addEventListener("click", handler);
        }, 0);
      }

      function removeGroupDropdown() {
        const d = document.getElementById("groupDropdown");
        if (d) d.remove();
      }

      /* SAVE */
      async function saveDisplay() {

        if (!selected) {
          alert("Select sensor first");
          return;
        }
        const highOp = document.getElementById("highOp")?.value || "";
        const highVal = document.getElementById("highVal")?.value || "";

        const lowOp = document.getElementById("lowOp")?.value || "";
        const lowVal = document.getElementById("lowVal")?.value || "";

        const groups = displayGroups;

        const groupString = groups.length ? [...new Set(groups)].join(",") + "," : "";

        const params = new URLSearchParams({
          mode: "display",
          sensorID: selected.sensorID,
          type: document.getElementById("type").value,
          label: document.getElementById("label").value,
          mainLabel: document.getElementById("mainLabel").value,
          mainUnit: document.getElementById("mainUnit")?.value || "",
          subLabel: document.getElementById("subLabel").value,
          subUnit: document.getElementById("subUnit")?.value || "",
          high: highVal ? highOp + highVal : "",
          low: lowVal ? lowOp + lowVal : "",
          group: groupString
        });

        const btn = document.querySelector("#displayBox .saveBtn");

        try {
          btn.innerText = "Saving...";

          const res = await fetch(BASE_URL, {
            method: "POST",
            body: params
          });

          if (!res.ok) throw new Error();

          // ✅ Show success FIRST
          btn.innerText = "Saved ✓";

          // ✅ Wait → THEN close + reload
          setTimeout(async () => {
            btn.innerText = "Save";
            await loadSettings();
          }, 1200);

        } catch {
          btn.innerText = "Error!";
        }
      }

      function renderGroupMaster() {

        const container = document.getElementById("groupMasterContainer");
        if (!container) return;

        container.innerHTML = "";

        // ➕ ADD BUTTON FIRST
        const addWrapper = document.createElement("div");
        addWrapper.style.position = "relative";

        const add = document.createElement("div");
        add.className = "add-chip";
        add.innerText = "+";

        add.onclick = (e) => {
          e.stopPropagation();
          e.preventDefault();
          toggleGroupMasterDropdown(addWrapper);
        };

        addWrapper.appendChild(add);
        container.appendChild(addWrapper);

        // EXISTING CHIPS
        masterGroups.forEach(g => {
          const chip = document.createElement("div");
          chip.className = "group-chip";
          chip.innerHTML = `
      <span class="group-text">${g}</span>
      <span class="remove">✕</span>
    `;

          chip.querySelector(".remove").onclick = (e) => {
            e.stopPropagation();

            masterGroups = masterGroups.filter(x => x !== g);
            removedGroups.push(g);

            renderGroupMaster();
          };

          container.appendChild(chip);
        });
      }

      function toggleGroupMasterDropdown(wrapper) {

        const existing = document.getElementById("groupMasterDropdown");
        if (existing) {
          existing.remove();
          return;
        }

        const dropdown = document.createElement("div");
        dropdown.id = "groupMasterDropdown";
        dropdown.className = "group-dropdown";

        // 🔹 ADD NEW GROUP INPUT
        const input = document.createElement("input");
        input.placeholder = "Add group...";
        input.style.width = "100%";
        input.style.marginBottom = "6px";

        input.onkeydown = (e) => {
          if (e.key === "Enter") {
            const val = input.value.trim();
            if (!val) return;

            if (!masterGroups.includes(val)) {
              masterGroups.push(val);
            }

            input.value = "";
            input.focus();
            dropdown.remove();
            renderGroupMaster();
          }
        };

        dropdown.appendChild(input);

        // 🔹 REMOVED GROUPS
        if (removedGroups.length) {

          removedGroups.forEach(g => {
            const item = document.createElement("div");
            item.className = "group-option";
            item.innerText = g;

            item.onclick = () => {
              if (!masterGroups.includes(g)) {
                masterGroups.push(g);
              }
              removedGroups = removedGroups.filter(x => x !== g);

              dropdown.remove();
              renderGroupMaster();
            };

            dropdown.appendChild(item);
          });

        } else {
          const empty = document.createElement("div");
          empty.style.padding = "8px";
          empty.style.opacity = "0.6";
          empty.innerText = "No removed groups";
          dropdown.appendChild(empty);
        }

        wrapper.appendChild(dropdown);

        // outside click close
        setTimeout(() => {
          const handler = (e) => {
            if (!wrapper.contains(e.target)) {
              dropdown.remove();
              document.removeEventListener("click", handler);
            }
          };
          document.addEventListener("click", handler);
        }, 0);
      }

      async function saveGroupList() {

        const btn = document.querySelector("#groupBox .saveBtn");

        const groupString = masterGroups.length
          ? masterGroups.join(",") + ","
          : "";

        const params = new URLSearchParams({
          mode: "groupList",
          groups: groupString
        });

        try {
          btn.innerText = "Saving...";

          const res = await fetch(BASE_URL, {
            method: "POST",
            body: params
          });

          if (!res.ok) throw new Error();

          // ✅ Show success
          btn.innerText = "Saved ✓";

          // ✅ Wait → then reload
          setTimeout(async () => {
            btn.innerText = "Save";
            await loadSettings();
          }, 1200);

        } catch {
          btn.innerText = "Error!";
        }
      }

    </script>

</body>
