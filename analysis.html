<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analysis Dashboard</title>

  <!-- TAB ICON -->
  <link rel="icon" type="image/png"
    href="https://raw.githubusercontent.com/voltraxxtechnologies-boop/my-website-assets/53933e88a81248217341a7e370001d6d63296433/LOGO1.png">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6A329F, #3B1C5B);
      color: white;
      overflow-x: hidden;
    }

    /* ---------- NAVIGATION BAR ---------- */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      /* FIXED */
      padding: 18px 24px;
      background: rgba(26, 26, 26, 0.35);
      position: relative;
      z-index: 1000;
      /* height: 60px; */
    }

    /* BRAND (logo + Voltraxx) */
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      /* ❗ Prevent compression */
      white-space: nowrap;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.1;
    }

    .nav-logo-box {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .nav-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo {
      font-size: 26px;
      font-weight: bold;
      flex-shrink: 0;
    }

    .user-info {
      font-size: 13px;
      line-height: 1.2;
      opacity: 0.9;
    }

    /* NAV BUTTONS */
    .nav-buttons {
      display: flex;
      gap: 20px;
      margin-left: 30px;
      flex-shrink: 1;
      /* buttons adapt instead of brand */
    }

    .nav-buttons button {
      background: transparent;
      color: #f2f2f2;
      padding: 8px 14px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.25s;
      white-space: nowrap;
    }

    .nav-buttons button.active {
      background: linear-gradient(135deg, #C9A8E3, #6A329F);
      font-weight: bold;
      color: #fff;
    }

    .nav-buttons button:hover {
      border: 2px solid #C9A8E3;
    }

    /* HAMBURGER MENU */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      margin-left: 20px;
      flex-shrink: 0;
    }

    .hamburger div {
      height: 3px;
      width: 28px;
      background: white;
      border-radius: 2px;
    }

    @media(max-width:600px) {
      .nav-buttons {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }

    /* MOBILE MENU */
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(26, 26, 26, 0.95);
      padding: 12px;
      position: absolute;
      left: 0;
      right: 0;
      top: 90px;
      /* CONSISTENT WITH MONITORING */
      z-index: 6000;
    }

    .mobile-menu button {
      background: transparent;
      border: none;
      font-size: 16px;
      color: white;
      padding: 14px;
      text-align: left;
    }

    .mobile-menu button.active {
      font-weight: bold;
      color: #ffd6ff;
    }

    /* ---------- CONTENT ---------- */
    .section-wrap {
      padding: 0;
    }

    .section-title {
      margin: 20px 8px;
      font-size: 20px;
      font-weight: 600;
      color: #fff;
    }

    .section {
      display: flex;
      flex-wrap: wrap;
      /* allow next row */
      gap: 12px;
      padding: 8px 10px 22px;
    }

    .card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(8px);
      padding: 10px;
      border-radius: 12px;
      width: 210px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
      cursor: pointer;
      transition: 0.22s;
    }

    @media (max-width:1200px) {
      .card {
        width: 200px;
      }
    }

    @media (max-width:900px) {
      .card {
        width: 180px;
      }
    }

    @media (max-width:600px) {
      .card {
        width: 160px;
      }
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.55);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 16px;
      font-weight: 700;
    }

    .ids {
      font-size: 12px;
      opacity: 0.85;
    }

    .chart-container {
      margin-top: 6px;
      height: 150px;
    }

    canvas {
      width: 100% !important;
      height: 150px !important;
    }

    #popupOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    #popupCard {
      background: #3B1C5B;
      padding: 20px;
      border-radius: 14px;
      width: 90%;
      max-width: 700px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
    }

    .company {
      font-size: 16px;
      font-weight: bold;
      color: #e69df4;
    }

    .device {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 6px;
    }

    #popupHeader {
      margin-bottom: 10px;
    }

    #popupHeader .title {
      font-size: 13px;
      font-weight: bold;
    }

    #popupHeader .ids {
      font-size: 13px;
      opacity: 0.85;
    }

    #popupHeader .mode {
      font-size: 12px;
      opacity: 0.8;
      margin-top: 4px;
    }

    #popupChart {
      width: 100% !important;
      height: 300px !important;
    }

    #popupInfo {
      margin-top: 15px;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Dropdown */
    #valueMode {
      margin: 15px 40px;
      padding: 8px 14px;

      background: #3B1C5B;
      backdrop-filter: blur(8px);

      color: white;
      font-size: 14px;
      font-weight: 500;

      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;

      outline: none;
      cursor: pointer;

      transition: all 0.25s ease;
    }

    /* Hover */
    #valueMode:hover {
      border-color: #C9A8E3;
      box-shadow: 0 0 6px rgba(201, 168, 227, 0.4);
    }

    /* Focus (clicked) */
    #valueMode:focus {
      border-color: #C9A8E3;
      box-shadow: 0 0 10px rgba(201, 168, 227, 0.6);
    }

    /* Dropdown options */
    #valueMode option {
      background: #1a1a2e;
      color: white;
    }

    /* --------- LOADING SCREEN (unchanged) --------- */
    #loadingScreen {
      position: fixed;
      top: 90px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(20, 20, 20, 0.92);
      backdrop-filter: blur(4px);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 5000;
      color: white;
      text-align: center;
    }

    .loader {
      width: 55px;
      height: 55px;
      border: 5px solid #ffffff55;
      border-top-color: #C9A8E3;
      border-radius: 50%;
      animation: spin .9s linear infinite;
      margin-bottom: 10px;
    }

    #valueMode {
      margin-left: 15px;
      font-size: 14px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <!-- LOADING SCREEN -->
  <div id="loadingScreen">
    <div class="loader"></div>
    <p>Loading...</p>
  </div>

  <script>
    function showLoader() {
      const l = document.getElementById("loadingScreen");
      if (l) l.style.display = "flex";
    }
    function hideLoader() {
      const l = document.getElementById("loadingScreen");
      if (l) l.style.display = "none";
    }
  </script>

  <!-- NAV -->
  <div class="top-nav">

    <div class="nav-brand">

      <div class="nav-logo-box">
        <img
          src="https://raw.githubusercontent.com/voltraxxtechnologies-boop/my-website-assets/53933e88a81248217341a7e370001d6d63296433/LOGO1.png">
      </div>

      <div class="brand-text">
        <div class="logo">Voltraxx</div>
        <div class="user-info" id="userInfo"></div>
      </div>

    </div>

    <div class="nav-buttons">
      <button onclick="navigate('monitoring.html')">Monitoring</button>
      <button class="active" onclick="navigate('analysis.html')">Analysis</button>
      <button onclick="navigate('history.html')">History</button>
      <button onclick="navigate('settings.html')">Settings</button>
      <button onclick="logoutUser()">Logout</button>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
      <div></div>
      <div></div>
      <div></div>
    </div>

  </div>

  <!-- MOBILE MENU -->
  <div id="mobileMenu" class="mobile-menu">
    <button onclick="navigate('monitoring.html')">Monitoring</button>
    <button class="active" onclick="navigate('analysis.html')">Analysis</button>
    <button onclick="navigate('history.html')">History</button>
    <button onclick="navigate('settings.html')">Settings</button>
    <button onclick="logoutUser()">Logout</button>
  </div>

  <select id="valueMode">
    <option value="raw">RAW Data</option>
    <option value="main">Main Data</option>
    <option value="sub">Sub Data</option>
  </select>

  <!-- CONTENT -->
  <div id="sections" class="section-wrap"></div>

  <!-- POPUP -->
  <div id="popupOverlay" onclick="closePopup(event)">
    <div id="popupCard">

      <div id="popupHeader"></div>

      <canvas id="popupChart"></canvas>

      <div id="popupInfo"></div>

      <button id="downloadBtn" onclick="downloadChart()" style="
          margin-top:15px;
          padding:10px 16px;
          border:none;
          border-radius:8px;
          background:linear-gradient(135deg,#C9A8E3,#6A329F);
          color:white;
          font-weight:600;
          cursor:pointer;
          width:100%;
        ">
        Download as JPEG
      </button>

    </div>
  </div>

  <script>

    let valueMode = "raw";

    /* NAVIGATION */
    function toggleMenu() {
      const m = document.getElementById("mobileMenu");
      m.style.display = (m.style.display === "flex") ? "none" : "flex";
    }

    function navigate(p) { window.location.href = p; }

    function logoutUser() {
      sessionStorage.clear();
      window.location = "index.html";
    }

    /* API CHECK */
    const BASE_URL = sessionStorage.getItem("BASE_URL");
    if (!BASE_URL) {
      alert("Session expired."); window.location = "index.html";
    }
    function loadUserInfo() {

      const client = sessionStorage.getItem("CLIENT") || "Unknown";
      const device = sessionStorage.getItem("DEVICE_ID") || "-";

      const el = document.getElementById("userInfo");

      if (el) {
        el.innerHTML = `${client} - ID: ${device}`;
      }
    }

    loadUserInfo();
    function checkSession() {

      const loginTime = sessionStorage.getItem("LOGIN_TIME");

      if (!loginTime) {
        logoutUser();
        return;
      }

      const now = Date.now();
      const oneHour = 60 * 60 * 1000;

      if (now - loginTime > oneHour) {
        alert("Session expired. Please login again.");
        logoutUser();
      }
    }

    function resetTimer() {
      sessionStorage.setItem("LOGIN_TIME", Date.now());
    }

    document.addEventListener("click", resetTimer);
    document.addEventListener("keydown", resetTimer);

    checkSession();
    setInterval(checkSession, 10000);


    /* FETCH ANALYSIS DATA */
    function loadAnalysis() {

      fetch(`${BASE_URL}?page=analysis`)
        .then(r => r.json())
        .then(json => {

          window.sheetName = json.sheetName;

          setTimeout(() => hideLoader(), 300);

          const wrapper = document.getElementById('sections');
          wrapper.innerHTML = "";

          const groups = json.groups || {};
          const keys = Object.keys(groups).sort((a, b) => {

            if (a === "All") return 1;
            if (b === "All") return -1;

            return a.localeCompare(b);

          });

          keys.forEach(groupName => {

            const sensors = groups[groupName] || [];

            const validSensors = sensors.filter(sensor => {
              return Array.from({ length: 24 }).some((_, i) => {
                const v = sensor[i];
                return v && v !== "";
              });
            });

            if (!validSensors || validSensors.length === 0) return;

            const title = document.createElement('h2');
            title.className = 'section-title';
            title.innerText = groupName;
            wrapper.appendChild(title);

            const sec = document.createElement('div');
            sec.className = 'section';
            wrapper.appendChild(sec);

            validSensors.forEach(sensor => {
              sec.appendChild(createCard(sensor));
            });

          });

        })
        .catch(err => {
          hideLoader();
          console.error(err);
          document.getElementById('sections').innerHTML =
            '<div class="muted">Could not load data from API.</div>';
        });

    }

    document.getElementById("valueMode").addEventListener("change", function () {

      valueMode = this.value;

      showLoader();   // 🔥 SHOW LOADER
      loadAnalysis(); // reload data

    });
    /* INITIAL LOAD */
    loadAnalysis();
    /* AUTO REFRESH EVERY 30s */
    setInterval(() => {
      loadAnalysis(); // no loader here
    }, 60000);

    /* --- CARD BUILDER --- */
    function createCard(item) {
      const card = document.createElement('div');
      card.className = 'card';

      const labelText = item.label || "";
      const cID = item.controllerID, sID = item.sensorID;
      const cSID = `C${cID}:S${sID}`;

      const header = document.createElement('div');
      const modeInfo = document.createElement('div');
      modeInfo.style.fontSize = "11px";
      modeInfo.style.opacity = "0.8";

      if (valueMode === "raw") {
        modeInfo.innerText = "View: Raw Data | Unit: none";
      }

      if (valueMode === "main") {
        modeInfo.innerText =
          `View: ${item.mainLabel || "-"} | Unit: ${item.mainUnit || "-"}`;
      }

      if (valueMode === "sub") {
        modeInfo.innerText =
          `View: ${item.subLabel || "-"} | Unit: ${item.subUnit || "-"}`;
      }
      header.className = 'card-header';
      const t = document.createElement('div');
      t.className = 'title';
      t.innerText = labelText || `Sensor ${cSID}`;
      const ids = document.createElement('div');
      ids.className = 'ids';
      ids.innerText = cSID;
      header.appendChild(t); header.appendChild(ids);
      card.appendChild(header);
      card.appendChild(modeInfo);

      const wrap = document.createElement('div');
      wrap.className = 'chart-container';
      const canvas = document.createElement('canvas');
      wrap.appendChild(canvas);
      card.appendChild(wrap);

      renderChart(canvas, item);
      card.onclick = () => openPopup(item);

      return card;
    }

    /* --- CHART RENDER --- */
    function renderChart(canvas, item) {

      const labels = Array.from({ length: 24 }, (_, i) => String(i));

      const values = labels.map(k => {

        const v = item[k];

        if (!v || v === "") return null;

        const parts = String(v).split(",").map(p => p.replace(/[^\d.]/g, ""));

        // RAW → first
        if (valueMode === "raw") {
          return Number(parts[0]) || null;
        }

        // MAIN → second
        if (valueMode === "main") {
          return parts[1] ? Number(parts[1]) : null;
        }

        // SUB → third
        if (valueMode === "sub") {
          return parts[2] ? Number(parts[2]) : null;
        }

        return null;

      });

      if (canvas.chart) {
        canvas.chart.destroy();
      }

      // ---------------------------
      // 🔥 COLOR BASED ON MODE
      // ---------------------------
      const barColor =
        valueMode === "raw" ? "#e69df4" :   // PINK
          valueMode === "main" ? "#FEDC56" :  // YELLOW
            "#ff9800";                          // orange

      canvas.chart = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: barColor,
            borderRadius: 6
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#fff' }, grid: { display: false } },
            y: { ticks: { color: '#fff' } }
          },
          maintainAspectRatio: false
        }
      });
    }


    /* --- POPUP --- */
    let popupChartInstance = null;

    function openPopup(item) {

      document.getElementById("popupOverlay").style.display = "flex";

      const canvas = document.getElementById("popupChart");

      // ---------------------------
      // 🔥 BASIC INFO
      // ---------------------------
      const cID = item.controllerID;
      const sID = item.sensorID;
      const cSID = `C${cID}:S${sID}`;

      const title = item.label && item.label !== ""
        ? item.label
        : `Sensor ${cSID}`;

      // 👉 DEVICE ID (SAFE FALLBACK)
      const deviceID = window.sheetName || "V00000";

      // 👉 BUTTON TEXT (KEEP ":" for display)
      const fileBaseName = `${deviceID}_C${cID}:S${sID}`;
      document.getElementById("downloadBtn").innerText = `Download - ${fileBaseName}`;

      // ---------------------------
      // 🔥 MODE TEXT
      // ---------------------------
      let viewText = "Raw Data";
      let unitText = "none";

      if (valueMode === "main") {
        viewText = item.mainLabel || "-";
        unitText = item.mainUnit || "-";
      }

      if (valueMode === "sub") {
        viewText = item.subLabel || "-";
        unitText = item.subUnit || "-";
      }

      // ---------------------------
      // 🔥 HEADER
      // ---------------------------
      document.getElementById("popupHeader").innerHTML = `
    <div class="company">Voltraxx Tech</div>
    <div class="device">ID: ${deviceID}</div>

    <div class="title">${title}</div>
    <div class="ids">${cSID}</div>

    <div class="mode">View: ${viewText} | Unit: ${unitText}</div>
  `;

      // ---------------------------
      // 🔥 DESTROY OLD CHART
      // ---------------------------
      if (window.popupChartInstance) {
        window.popupChartInstance.destroy();
      }

      // ---------------------------
      // 🔥 PREPARE DATA
      // ---------------------------
      const labels = Array.from({ length: 24 }, (_, i) => String(i));

      const values = labels.map(k => {

        const v = item[k];
        if (!v || v === "") return null;

        const parts = String(v)
          .split(",")
          .map(p => p.replace(/[^\d.]/g, ""));

        if (valueMode === "raw") return Number(parts[0]) || null;
        if (valueMode === "main") return parts[1] ? Number(parts[1]) : null;
        if (valueMode === "sub") return parts[2] ? Number(parts[2]) : null;

        return null;

      });

      // ---------------------------
      // 🔥 COLOR BASED ON MODE
      // ---------------------------
      const barColor =
        valueMode === "raw" ? "#e69df4" :   // PINK
          valueMode === "main" ? "#FEDC56" :  // YELLOW
            "#ff9800";                          // orange

      // ---------------------------
      // 🔥 CREATE CHART
      // ---------------------------
      window.popupChartInstance = new Chart(canvas.getContext("2d"), {
        type: "bar",
        data: {
          labels,
          datasets: [{
            data: values,
            backgroundColor: barColor,
            borderRadius: 6
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#fff" } },
            y: { ticks: { color: "#fff" } }
          }
        }
      });

      // ---------------------------
      // 🔥 EXTRA INFO (DYNAMIC)
      // ---------------------------
      let info = [];

      // 👉 Include ALL dynamic custom fields (AO–AX)
      Object.keys(item).forEach(key => {

        if (
          !["controllerID", "sensorID", "label", "type",
            "mainLabel", "mainUnit", "subLabel", "subUnit"]
            .includes(key)
          && isNaN(key) // skip time keys (0–23)
        ) {
          info.push(`${key}: ${item[key]}`);
        }

      });

      document.getElementById("popupInfo").innerText =
        info.length ? info.join("\n") : "No extra data";
    }

    function closePopup(e) {

      // close only if clicked outside card
      if (e.target.id === "popupOverlay") {
        document.getElementById("popupOverlay").style.display = "none";
      }
    }

    function downloadChart() {

      const popup = document.getElementById("popupCard");
      if (!popup) return;

      const deviceID = window.sheetName || "V00000";

      const rawIds = document.querySelector("#popupHeader .ids")?.innerText || "";
      const ids = rawIds.replace(":", "_");   // 🔥 FIX

      // ids = C1:S10

      const now = new Date();

      const yyyy = now.getFullYear();
      const mm = String(now.getMonth() + 1).padStart(2, "0");
      const dd = String(now.getDate()).padStart(2, "0");

      const hh = String(now.getHours()).padStart(2, "0");
      const min = String(now.getMinutes()).padStart(2, "0");

      const fileName =
        `${deviceID}_${ids}_D_${yyyy}_${mm}_${dd}_T_${hh}_${min}`.replace(/\s+/g, "_");

      html2canvas(popup, {
        backgroundColor: null,
        scale: 2
      }).then(canvas => {

        const link = document.createElement("a");

        link.download = fileName + ".jpg";
        link.href = canvas.toDataURL("image/jpeg", 1.0);

        link.click();

      });

    }
  </script>

</body>

</html>
