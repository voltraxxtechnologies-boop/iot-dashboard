<!DOCTYPE html>
<html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>History Dashboard</title>

  <link rel="icon" type="image/png"
    href="https://raw.githubusercontent.com/voltraxxtechnologies-boop/my-website-assets/53933e88a81248217341a7e370001d6d63296433/LOGO1.png">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #6A329F, #3B1C5B);
      color: white;
      overflow-x: hidden;
    }

    /* ---------- NAV ---------- */
    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: rgba(26, 26, 26, 0.35);
      position: relative;
      z-index: 1000;
      /* height: 60px; */
    }

    /* BRAND (logo + Voltraxx) */
    .nav-brand {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
      justify-content: center;
      line-height: 1.1;
    }

    .nav-logo-box {
      width: 60px;
      height: 60px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .nav-logo-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo {
      font-size: 26px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-info {
      font-size: 13px;
      line-height: 1.2;
      opacity: 0.9;
    }

    /* NAV BUTTONS */
    .nav-buttons {
      display: flex;
      gap: 20px;
      margin-left: 30px;
      flex-shrink: 1;
    }

    .nav-buttons button {
      background: transparent;
      color: white;
      padding: 8px 14px;
      font-size: 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: .25s;
      white-space: nowrap;
    }

    .nav-buttons button.active {
      background: linear-gradient(135deg, #C9A8E3, #6A329F);
      font-weight: 700;
      color: white;
    }

    .nav-buttons button:hover {
      border: 2px solid #C9A8E3;
    }

    /* HAMBURGER */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      margin-left: 20px;
      flex-shrink: 0;
    }

    .hamburger div {
      width: 28px;
      height: 3px;
      background: white;
      border-radius: 2px;
    }


    @media(max-width:600px) {
      .nav-buttons {
        display: none;
      }

      .hamburger {
        display: flex;
      }
    }

    /* ---------- MOBILE MENU ---------- */
    .mobile-menu {
      display: none;
      flex-direction: column;
      background: rgba(26, 26, 26, 0.95);
      padding: 12px;
      position: absolute;
      left: 0;
      right: 0;
      top: 90px;
      /* YOU REQUESTED */
      z-index: 6000;
    }

    .mobile-menu button {
      background: transparent;
      border: none;
      font-size: 16px;
      color: white;
      padding: 14px;
      text-align: left;
      white-space: nowrap;
    }

    .mobile-menu button.active {
      color: #ffd6ff;
      font-weight: bold;
    }

    /* ---------- FILTER BAR ---------- */
    .filters {
      padding: 14px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    select,
    input {
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
    }

    button.fetchBtn {
      padding: 9px 14px;
      border: none;
      border-radius: 8px;
      background: #C9A8E3;
      cursor: pointer;
      font-weight: 600;
    }

    /* FETCH BUTTON STATES */

    button.fetchBtn.loading {
      background: #ffca2c;
      color: #111;
      cursor: wait;
      position: relative;
    }

    button.fetchBtn.loading::after {
      content: "";
      width: 14px;
      height: 14px;
      border: 2px solid #333;
      border-top-color: transparent;
      border-radius: 50%;
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      animation: spin .7s linear infinite;
    }

    button.fetchBtn.success {
      background: #17c964;
      color: white;
    }

    button.fetchBtn.error {
      background: #ff4d4f;
      color: white;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* PAGE CONTAINER */

    .section-wrap {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    /* TABLE CARD */

    .card {
      background: white;
      color: black;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
    }

    /* TABLE SCROLL (only when needed) */
    .tableScroll {
      width: 100%;
      overflow-x: auto;
      /* scrollbar appears only if content overflows */
      overflow-y: hidden;
    }

    .tableScroll table {
      width: 100%;
      border-collapse: collapse;
    }

    /* TABLE */

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      color: black;
    }

    th,
    td {
      padding: 3px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #eeeeee;
      font-weight: 600;
    }

    .titleRow {
      font-weight: 700;
      text-align: left;
      padding: 10px;
      font-size: 15px;
      border-bottom: none;
    }

    .headerSpacer {
      height: 12px;
    }

    .dataRow td {
      font-size: 9px;
    }

    .downloadBtn {
      margin-top: 12px;
      background: #00b7ff;
      border: none;
      padding: 7px 14px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- NAVIGATION -->

  <div class="top-nav">

    <div class="nav-brand">

      <div class="nav-logo-box">
        <img
          src="https://raw.githubusercontent.com/voltraxxtechnologies-boop/my-website-assets/53933e88a81248217341a7e370001d6d63296433/LOGO1.png">
      </div>

      <div class="brand-text">
        <div class="logo">Voltraxx</div>
        <div class="user-info" id="userInfo"></div>
      </div>

    </div>

    <div class="nav-buttons">
      <button onclick="nav('monitoring.html')">Monitoring</button>
      <button onclick="nav('analysis.html')">Analysis</button>
      <button class="active" onclick="nav('history.html')">History</button>
      <button onclick="nav('settings.html')">Settings</button>
      <button onclick="logoutUser()">Logout</button>
    </div>

    <div class="hamburger" onclick="toggleMenu()">
      <div></div>
      <div></div>
      <div></div>
    </div>

  </div>

  <div id="mobileMenu" class="mobile-menu">
    <button onclick="nav('monitoring.html')">Monitoring</button>
    <button onclick="nav('analysis.html')">Analysis</button>
    <button onclick="nav('history.html')">History</button>
    <button onclick="nav('settings.html')">Settings</button>
    <button onclick="logoutUser()">Logout</button>
  </div>

  <!-- FILTER -->

  <div class="filters">

    <div class="filter-box">
      <label>Sensor</label>
      <select id="sensorSelect">
        <option value="">Select</option>
      </select>
    </div>

    <div class="filter-box">
      <label>Date From</label>
      <input type="date" id="fromDate">
    </div>

    <div class="filter-box">
      <label>Date To</label>
      <input type="date" id="toDate">
    </div>

    <button class="fetchBtn" onclick="getHistory()">Fetch</button>

  </div>

  <div id="sections" class="section-wrap"></div>

  <script>

    function nav(p) { window.location.href = p }

    function toggleMenu() {
      const m = document.getElementById("mobileMenu")
      m.style.display = (m.style.display === "flex") ? "none" : "flex"
    }


    const BASE_URL = sessionStorage.getItem("BASE_URL")
    // ================= SESSION CONTROL =================
    function loadUserInfo() {

      const client = sessionStorage.getItem("CLIENT") || "Unknown";
      const device = sessionStorage.getItem("DEVICE_ID") || "-";

      const el = document.getElementById("userInfo");

      if (el) {
        el.innerHTML = `${client} - ID: ${device}`;
      }
    }

    loadUserInfo();

    function logoutUser() {
      sessionStorage.clear();
      window.location = "index.html";
    }

    function checkSession() {

      const loginTime = sessionStorage.getItem("LOGIN_TIME");

      if (!loginTime) {
        logoutUser();
        return;
      }

      const now = Date.now();
      const oneHour = 60 * 60 * 1000;

      if (now - loginTime > oneHour) {
        alert("Session expired. Please login again.");
        logoutUser();
      }
    }

    // Reset timer on user activity
    function resetTimer() {
      sessionStorage.setItem("LOGIN_TIME", Date.now());
    }

    // Track activity
    document.addEventListener("click", resetTimer);
    document.addEventListener("keydown", resetTimer);

    // Run session check
    checkSession();
    setInterval(checkSession, 10000);

    window.onload = () => {

      fetch(`${BASE_URL}?page=history`)
        .then(r => r.json())
        .then(j => {

          const sel = document.getElementById("sensorSelect")

          if (j.AvailableSensors) {

            j.AvailableSensors.forEach(id => {

              const o = document.createElement("option")
              o.value = id
              o.innerText = `Sensor ${id}`

              sel.appendChild(o)

            })

          }

        })

    }

    async function getHistory() {

      const btn = document.querySelector(".fetchBtn")

      btn.classList.remove("success", "error")
      btn.classList.add("loading")
      btn.innerText = "Fetching..."

      const sensor = document.getElementById("sensorSelect").value
      const from = document.getElementById("fromDate").value
      const to = document.getElementById("toDate").value

      if (!sensor || !from) {
        btn.classList.remove("loading")
        btn.classList.add("error")
        btn.innerText = "Select Inputs"
        return
      }

      const format = d => {
        const p = d.split("-")
        return `${p[2]}/${p[1]}/${p[0]}`
      }

      let url = `${BASE_URL}?page=history&sensorid=${sensor}&from=${format(from)}`

      if (to) url += `&to=${format(to)}`

      try {

        const res = await fetch(url)
        const j = await res.json()

        if (j.status !== "ok") {
          throw new Error("No Data")
        }

        renderTables(j.sheetName, j.header, j.rows)

        btn.classList.remove("loading")
        btn.classList.add("success")
        btn.innerText = "Fetched ✔"

      }
      catch (e) {

        btn.classList.remove("loading")
        btn.classList.add("error")
        btn.innerText = "Error"

      }

    }

    function renderTables(clientID, header, rows) {

      const wrap = document.getElementById("sections")
      wrap.innerHTML = ""

      const controller = rows[0][1]
      const sensor = rows[0][2]

      const hourIndex = []

      for (let i = 0; i < 24; i++) {
        hourIndex.push(header.indexOf(i))
      }

      const chunkSize = 40
      const totalPages = Math.ceil(rows.length / chunkSize)

      for (let p = 0; p < totalPages; p++) {

        const start = p * chunkSize
        const end = start + chunkSize
        const pageRows = rows.slice(start, end)

        const card = document.createElement("div")
        card.className = "card"

        const table = document.createElement("table")
        table.id = `tablePage${p + 1}`

        let html = ""

        html += `<tr><td colspan="25" style="height:15px;border:none;"></td></tr>`

        html += `
<tr>
<td colspan="25" class="titleRow">
VOLTRAXX TECHNOLOGIES, client id: ${clientID}, Controller ID: ${controller}, Sensor ID: ${sensor}, page: ${p + 1}
</td>
</tr>
`

        html += `<tr class="headerSpacer"><td colspan="25"></td></tr>`

        html += "<tr><th>Date</th>"

        for (let i = 0; i < 24; i++) {
          html += `<th>${i}</th>`
        }

        html += "</tr>"

        pageRows.forEach(r => {

          html += "<tr class='dataRow'>"
          html += `<td>${r[0]}</td>`

          hourIndex.forEach(i => {
            html += `<td>${(r[i] === null || r[i] === "" || r[i] === undefined) ? "." : r[i]}</td>`
          })

          html += "</tr>"

        })

        table.innerHTML = html

        const scroll = document.createElement("div")
        scroll.className = "tableScroll"

        scroll.appendChild(table)

        card.appendChild(scroll)

        const btn = document.createElement("button")
        btn.className = "downloadBtn"
        btn.innerText = `Download Page ${p + 1}`

        btn.onclick = () => downloadPDF(table.id, p + 1, clientID, sensor)

        card.appendChild(btn)

        wrap.appendChild(card)

      }

    }

    async function downloadPDF(tableID, page, clientID, sensor) {

      const { jsPDF } = window.jspdf

      const table = document.getElementById(tableID)

      const canvas = await html2canvas(table, { scale: 2 })

      const img = canvas.toDataURL("image/png")

      const pdf = new jsPDF("p", "mm", "a4")

      const width = 210
      const topMargin = 15
      const height = (canvas.height * (width - 10)) / canvas.width

      pdf.addImage(img, "PNG", 5, topMargin, width - 10, height)

      const from = document.getElementById("fromDate").value
      const to = document.getElementById("toDate").value || from

      const fileName = `${clientID}_S${sensor}_${from}_to_${to}_page_${page}.pdf`

      pdf.save(fileName)

    }

  </script>

</body>

</html>
